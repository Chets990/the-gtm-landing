<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The GTM — AI-Powered GTM Strategy & Outbound Execution</title>
  <meta name="description" content="Build your GTM strategy, find the right prospects, and run consistent outbound — automatically. No agency. No GTM engineer. Just results." />
  <meta name="keywords" content="GTM strategy, outbound automation, AI prospecting, ICP segmentation, B2B outbound, sales automation" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0A0A0A; --white: #FFFFFF; --gray-100: #F5F5F5;
      --gray-300: #D1D1D1; --gray-500: #737373; --accent: #FF4D00;
      --accent-light: #FFF0EB; --font-display: 'Sora', sans-serif;
      --font-body: 'Inter', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--font-body); background: var(--white); color: var(--black); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px); border-bottom: 1px solid var(--gray-300); padding: 0 2rem; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 1.25rem; color: var(--black); text-decoration: none; letter-spacing: -0.02em; }
    .nav-logo span { color: var(--accent); }
    .nav-cta { background: var(--black); color: var(--white); padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.875rem; font-weight: 600; text-decoration: none; transition: background 0.2s; }
    .nav-cta:hover { background: var(--accent); }
    .hero { padding: 140px 2rem 80px; max-width: 900px; margin: 0 auto; text-align: center; }
    .hero-badge { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--accent-light); color: var(--accent); font-size: 0.8rem; font-weight: 600; padding: 0.35rem 0.85rem; border-radius: 100px; margin-bottom: 2rem; letter-spacing: 0.04em; text-transform: uppercase; }
    .hero h1 { font-family: var(--font-display); font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 800; line-height: 1.08; letter-spacing: -0.03em; color: var(--black); margin-bottom: 1.5rem; }
    .hero h1 span { color: var(--accent); }
    .hero-sub { font-size: 1.2rem; color: var(--gray-500); max-width: 600px; margin: 0 auto 2.5rem; line-height: 1.7; }
    .hero-actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; margin-bottom: 3rem; }
    .btn-primary { background: var(--accent); color: var(--white); padding: 0.875rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 700; text-decoration: none; transition: opacity 0.2s, transform 0.2s; display: inline-block; }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-secondary { background: var(--white); color: var(--black); padding: 0.875rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 600; text-decoration: none; border: 1.5px solid var(--gray-300); transition: border-color 0.2s; display: inline-block; }
    .btn-secondary:hover { border-color: var(--black); }
    .hero-note { font-size: 0.85rem; color: var(--gray-500); }
    .problem { background: var(--black); color: var(--white); padding: 80px 2rem; text-align: center; }
    .problem-inner { max-width: 720px; margin: 0 auto; }
    .section-label { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.25rem; }
    .problem h2 { font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; margin-bottom: 1.5rem; }
    .problem p { font-size: 1.1rem; color: rgba(255,255,255,0.65); line-height: 1.75; }
    .problem strong { color: var(--white); }
    .how { padding: 100px 2rem; max-width: 1000px; margin: 0 auto; }
    .how-header { text-align: center; margin-bottom: 4rem; }
    .how-header h2 { font-family: var(--font-display); font-size: clamp(1.75rem, 4vw, 2.5rem); font-weight: 700; letter-spacing: -0.02em; margin-bottom: 1rem; }
    .how-header p { font-size: 1.05rem; color: var(--gray-500); max-width: 520px; margin: 0 auto; }
    .steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 2rem; }
    .step { padding: 2rem; border: 1.5px solid var(--gray-300); border-radius: 12px; transition: border-color 0.2s, box-shadow 0.2s; }
    .step:hover { border-color: var(--accent); box-shadow: 0 4px 24px rgba(255,77,0,0.08); }
    .step-num { font-family: var(--font-display); font-size: 0.75rem; font-weight: 700; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 0.75rem; }
    .step h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.01em; }
    .step p { font-size: 0.9rem; color: var(--gray-500); line-height: 1.65; }
    .thesis { background: var(--gray-100); padding: 80px 2rem; text-align: center; }
    .thesis-inner { max-width: 700px; margin: 0 auto; }
    .thesis
